version: "3.8"

services:

  mongodb:
    image: mongo:latest
    container_name: mongodb

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: root

    volumes:
      - mongo-data:/data/db

    networks:
      - my-network


  backend:
    build: ./backend
    container_name: backend

    ports:
      - "5000:5000"

    environment:
      MONGODB_URI: mongodb://mongo:root@mongodb:27017/skincare?authSource=admin

    depends_on:
      - mongodb

    networks:
      - my-network


  frontend:
    build: ./frontend
    container_name: frontend

    ports:
      - "80:80"

    depends_on:
      - backend

    networks:
      - my-network


volumes:
  mongo-data:


networks:
  my-network: